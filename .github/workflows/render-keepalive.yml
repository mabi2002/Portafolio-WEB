# Mantiene el Web Service de Render despierto (plan free: ~15 min sin tráfico = sleep).
# Configura la variable del repositorio RENDER_HEALTH_URL (ver DEPLOYMENT.md).
#
# Si solo corre "manual" y nunca "scheduled": repo fork → habilitar Actions programados
# en la pestaña Actions. Rama por defecto debe ser la que tiene este archivo (main).
name: Render keep-alive

on:
  schedule:
    # Cada 5 min (UTC). GitHub puede retrasar ejecuciones programadas algunos minutos,
    # así evitamos superar la ventana de sleep (~15 min) del plan free de Render.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Ping health endpoint
        env:
          RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          set -e
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "::error::Falta la variable del repositorio RENDER_HEALTH_URL. Settings → Secrets and variables → Actions → Variables. Ejemplo: https://tu-backend.onrender.com/api/health"
            exit 1
          fi
          URL="${RENDER_HEALTH_URL%/}"
          # Si solo pegaste el dominio de Render, añade el health (evita timeout en "/" con servicio dormido)
          case "$URL" in
            */api/health) ;;
            *)
              echo "::notice::La URL no incluye /api/health; usando ${URL}/api/health"
              URL="${URL}/api/health"
              ;;
          esac
          echo "GET $URL"
          # Reintentos para cubrir cold start o latencia temporal de Render/GitHub.
          ATTEMPTS=3
          for i in $(seq 1 "$ATTEMPTS"); do
            if curl -fsS --max-time 180 -H "Accept: application/json" "$URL"; then
              echo ""
              echo "OK (intento $i/$ATTEMPTS)"
              exit 0
            fi
            if [ "$i" -lt "$ATTEMPTS" ]; then
              echo ""
              echo "Reintentando en 20s ($i/$ATTEMPTS)..."
              sleep 20
            fi
          done
          echo "::error::No se pudo hacer ping al endpoint tras $ATTEMPTS intentos"
          exit 1
