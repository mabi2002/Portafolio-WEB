# Mantiene el Web Service de Render despierto (plan free: ~15 min sin tráfico = sleep).
# Configura la variable del repositorio RENDER_HEALTH_URL (ver DEPLOYMENT.md).
name: Render keep-alive

on:
  schedule:
    # Cada 12 minutos (minutos 0, 12, 24, 36, 48 de cada hora)
    - cron: '*/12 * * * *'
  workflow_dispatch:

concurrency:
  group: render-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - name: Ping health endpoint
        env:
          RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          set -e
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "::error::Falta la variable del repositorio RENDER_HEALTH_URL. Settings → Secrets and variables → Actions → Variables. Ejemplo: https://tu-backend.onrender.com/api/health"
            exit 1
          fi
          URL="${RENDER_HEALTH_URL%/}"
          # Si solo pegaste el dominio de Render, añade el health (evita timeout en "/" con servicio dormido)
          case "$URL" in
            */api/health) ;;
            *)
              echo "::notice::La URL no incluye /api/health; usando ${URL}/api/health"
              URL="${URL}/api/health"
              ;;
          esac
          echo "GET $URL"
          # Cold start de JVM en free puede pasar de 90s; 180s suele bastar
          curl -fsS --max-time 180 -H "Accept: application/json" "$URL"
          echo ""
          echo "OK"
