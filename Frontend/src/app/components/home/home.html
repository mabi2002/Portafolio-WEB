<main class="container">
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Desarrollador Full Stack</h1>
      <p>Creando soluciones web innovadoras con tecnología moderna</p>
      <div class="hero-buttons">
        <a href="#proyectos" class="btn btn-primary">Ver Proyectos</a>
        <a href="/about" class="btn btn-secondary">Acerca de Mí</a>
      </div>
    </div>
  </section>

  <!-- Projects Section -->
  <section id="proyectos" class="projects-section">
    <h2>Proyectos Destacados</h2>

    <div *ngIf="cargando" class="loading">
      <p>Cargando proyectos...</p>
    </div>

    <div *ngIf="!cargando && proyectos.length === 0" class="empty-message">
      <p>No hay proyectos disponibles</p>
    </div>

    <div class="projects-grid" *ngIf="!cargando && proyectos.length > 0">
      <article class="project-card" *ngFor="let proyecto of proyectos">
        <a [routerLink]="['/proyecto', proyecto.id]" class="project-card-link">
          <div class="project-image" *ngIf="proyecto.imagenUrl">
            <img [src]="proyecto.imagenUrl" [alt]="proyecto.titulo">
          </div>
          <div class="project-content">
            <h3>{{ proyecto.titulo }}</h3>
            <p>{{ proyecto.descripcion }}</p>

            <div class="technologies" *ngIf="proyecto.tecnologias">
              <span class="tech-tag" *ngFor="let tech of proyecto.tecnologias.split(',')">
                {{ tech.trim() }}
              </span>
            </div>

            <div class="project-links">
              <a *ngIf="proyecto.urlGithub" [href]="proyecto.urlGithub"
                 class="project-link" target="_blank" (click)="$event.stopPropagation()">
                GitHub
              </a>
              <a *ngIf="proyecto.urlDemo" [href]="proyecto.urlDemo"
                 class="project-link" target="_blank" (click)="$event.stopPropagation()">
                Demo
              </a>
            </div>
          </div>
        </a>
      </article>
    </div>
  </section>
</main>

<app-footer></app-footer>
