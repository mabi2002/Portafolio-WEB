<main class="container">
  <section class="about-section">
    <h1>Acerca de Mí</h1>

    <div *ngIf="cargando" class="loading">
      <p>Cargando perfil...</p>
    </div>

    <div *ngIf="!cargando && perfil" class="about-content">
      <div class="about-hero">
        <img *ngIf="perfil.fotoUrl" [src]="perfil.fotoUrl" [alt]="perfil.nombre" class="profile-pic">
        <div class="about-info">
          <h2>{{ perfil.nombre }}</h2>
          <p class="title">{{ perfil.titulo }}</p>
          <p class="bio">{{ perfil.bio }}</p>
        </div>
      </div>

      <div *ngIf="perfil.experiencia" class="section">
        <h3>Experiencia</h3>
        <p>{{ perfil.experiencia }}</p>
      </div>

      <div *ngIf="perfil.educacion" class="section">
        <h3>Educación</h3>
        <p>{{ perfil.educacion }}</p>
      </div>
    </div>
  </section>
</main>

<app-footer></app-footer>
