# Production Configuration
spring.application.name=Portafolio

# Database Configuration (Supabase PostgreSQL)
# Using SPRING_DATASOURCE_* variables - automatically recognized by Spring Boot
# Set these in Render Environment:
# SPRING_DATASOURCE_HOST=db.sfxypsmjlyqqiwobgpdt.supabase.co
# SPRING_DATASOURCE_PORT=5432
# SPRING_DATASOURCE_USERNAME=postgres
# SPRING_DATASOURCE_PASSWORD=<your-password>
# Using Session Pooler (port 6543) instead of Direct Connection (5432) for IPv4 compatibility with Render
spring.datasource.url=jdbc:postgresql://${SPRING_DATASOURCE_HOST:db.sfxypsmjlyqqiwobgpdt.supabase.co}:${SPRING_DATASOURCE_PORT:6543}/postgres?sslmode=require&tcpKeepAlives=true&connectTimeout=10
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# HikariCP Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=1

# Logging - Detailed JDBC debugging for troubleshooting
logging.level.org.postgresql=DEBUG
logging.level.org.postgresql.core=DEBUG

# Thymeleaf Configuration
spring.thymeleaf.cache=true

# Internationalization (i18n)
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.web.locale=es_ES

# Flyway Configuration (DISABLED in production - migrations done manually)
spring.flyway.enabled=false

# JavaMail Configuration (DISABLED)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:disabled}
spring.mail.password=${MAIL_PASSWORD:disabled}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.starttls.required=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_FROM:noreply@portafolio.com}

# App Configuration
app.owner.email=${OWNER_EMAIL}

# CORS Configuration
cors.allowed-origins=${CORS_ORIGINS:https://portafolio.vercel.app}

# ========================================
# SUPABASE CREDENTIALS
# Usa estas variables en Render env:
# DB_HOST=db.sfxypsmjlyqqiwobgpdt.supabase.co
# DB_PORT=5432
# DB_USER=postgres
# DB_PASSWORD=tu_contraseña
# DB_NAME=postgres
# ========================================

# Server
server.port=${PORT:8081}
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.MiguelAngelBarraza=INFO
